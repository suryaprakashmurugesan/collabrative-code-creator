<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Editor - Real-time Collaborative Code Editor</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        background: #1a1a2e;
        color: white;
      }

      .header {
        background: rgba(20, 20, 35, 0.9);
        backdrop-filter: blur(10px);
        border-bottom: 2px solid rgba(100, 200, 255, 0.2);
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        position: sticky;
        top: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .logo-text {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #64c8ff, #d464ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .user-info {
        background: rgba(100, 200, 255, 0.1);
        border: 1px solid rgba(100, 200, 255, 0.2);
        padding: 8px 15px;
        border-radius: 8px;
        font-size: 0.9rem;
        color: #64c8ff;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .btn-logout {
        background: rgba(255, 100, 100, 0.2);
        border: 1px solid rgba(255, 100, 100, 0.5);
        color: #ff6b6b;
        padding: 8px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .btn-logout:hover {
        background: rgba(255, 100, 100, 0.3);
        transform: translateY(-2px);
      }

      .btn-new-project {
        background: linear-gradient(135deg, #64c8ff, #4db8ff);
        border: 1px solid #64c8ff;
        color: #1a1a2e;
        padding: 8px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .btn-new-project:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(100, 200, 255, 0.4);
      }

      /* MODAL STYLES */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        backdrop-filter: blur(5px);
      }

      .modal-content {
        background: rgba(42, 45, 56, 0.95);
        border: 2px solid rgba(100, 200, 255, 0.3);
        border-radius: 15px;
        padding: 40px;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(100, 200, 255, 0.2);
        position: relative;
      }

      .modal-close {
        position: absolute;
        top: 15px;
        right: 15px;
        background: rgba(255, 100, 100, 0.2);
        border: 1px solid rgba(255, 100, 100, 0.5);
        color: #ff6b6b;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        font-size: 1.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-close:hover {
        background: rgba(255, 100, 100, 0.3);
      }

      .modal-content h2 {
        color: #64c8ff;
        margin-bottom: 25px;
        font-size: 1.8rem;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #64c8ff;
        font-weight: 600;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 12px;
        border: 1px solid rgba(100, 200, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        color: white;
        font-size: 1rem;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #64c8ff;
        box-shadow: 0 0 10px rgba(100, 200, 255, 0.2);
      }

      .template-preview {
        background: rgba(20, 20, 35, 0.8);
        border: 1px solid rgba(100, 200, 255, 0.2);
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
        max-height: 300px;
        overflow-y: auto;
      }

      .template-preview h4 {
        color: #64c8ff;
        margin-bottom: 10px;
        font-size: 0.9rem;
      }

      .template-preview pre {
        color: #b0d4ff;
        font-size: 0.85rem;
        line-height: 1.4;
        margin: 0;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .modal-buttons {
        display: flex;
        gap: 10px;
        margin-top: 25px;
      }

      .btn-modal-primary {
        flex: 1;
        padding: 12px;
        background: linear-gradient(135deg, #64c8ff, #4db8ff);
        border: 1px solid #64c8ff;
        color: #1a1a2e;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-modal-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(100, 200, 255, 0.4);
      }

      .btn-modal-secondary {
        flex: 1;
        padding: 12px;
        background: rgba(100, 200, 255, 0.1);
        border: 1px solid #64c8ff;
        color: #64c8ff;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-modal-secondary:hover {
        background: rgba(100, 200, 255, 0.2);
      }

      #root {
        height: calc(100vh - 70px);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .connection-status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #4caf50;
        animation: pulse 2s ease-in-out infinite;
      }

      .status-dot.disconnected {
        background: #ff6b6b;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      /* Code Generator Main Interface */
      .code-generator-main {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        min-height: calc(100vh - 80px);
        background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .generator-container {
        text-align: center;
        max-width: 700px;
      }

      .generator-icon {
        font-size: 120px;
        margin-bottom: 30px;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-30px); }
      }

      .generator-title {
        font-size: 3.5rem;
        font-weight: 700;
        margin-bottom: 15px;
        background: linear-gradient(135deg, #64c8ff, #d464ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .generator-subtitle {
        font-size: 1.3rem;
        color: #b0d4ff;
        margin-bottom: 50px;
        line-height: 1.6;
      }

      .btn-generate-large {
        display: inline-block;
        padding: 25px 80px;
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #64c8ff, #4db8ff);
        color: #0f0c29;
        border: 3px solid #64c8ff;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        box-shadow: 0 8px 32px rgba(100, 200, 255, 0.3);
        z-index: 100;
        position: relative;
      }

      .btn-generate-large:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 48px rgba(100, 200, 255, 0.5);
      }

      .btn-generate-large:active {
        transform: translateY(-2px);
      }
      
      .btn-generate-large:focus {
        outline: none;
      }

      .code-generator-fullscreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        z-index: 5000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .code-generator-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .code-generator-inner {
        max-width: 900px;
        width: 100%;
        background: rgba(42, 45, 56, 0.7);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(100, 200, 255, 0.2);
        border-radius: 20px;
        padding: 50px;
        box-shadow: 0 8px 32px rgba(100, 200, 255, 0.1);
      }

      .code-generator-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      .code-generator-header h1 {
        font-size: 2.5rem;
        background: linear-gradient(135deg, #64c8ff, #d464ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .btn-close-generator {
        background: rgba(255, 100, 100, 0.2);
        border: 2px solid rgba(255, 100, 100, 0.5);
        color: #ff6b6b;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        font-size: 2rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-close-generator:hover {
        background: rgba(255, 100, 100, 0.3);
        transform: rotate(90deg);
      }

      .code-input-area {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-bottom: 30px;
      }

      .code-input-section {
        display: flex;
        flex-direction: column;
      }

      .code-input-section h3 {
        color: #64c8ff;
        margin-bottom: 15px;
        font-size: 1.2rem;
      }

      .code-input-section input {
        padding: 15px;
        border: 2px solid rgba(100, 200, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        color: white;
        font-size: 1rem;
        margin-bottom: 10px;
      }

      .code-input-section input:focus {
        outline: none;
        border-color: #64c8ff;
        box-shadow: 0 0 15px rgba(100, 200, 255, 0.3);
      }

      .code-output-area {
        background: rgba(20, 20, 35, 0.9);
        border: 1px solid rgba(100, 200, 255, 0.2);
        border-radius: 8px;
        padding: 20px;
        font-family: 'Courier New', monospace;
        font-size: 0.85rem;
        line-height: 1.6;
        color: #64c8ff;
        max-height: 400px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        min-height: 200px;
      }

      .code-buttons {
        display: flex;
        gap: 15px;
        margin-top: 20px;
      }

      .code-buttons button {
        flex: 1;
        padding: 15px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 1rem;
        text-transform: uppercase;
      }

      .btn-gen-code {
        background: linear-gradient(135deg, #64c8ff, #4db8ff);
        color: #0f0c29;
      }

      .btn-gen-code:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(100, 200, 255, 0.4);
      }

      .btn-copy-gen {
        background: linear-gradient(135deg, #d464ff, #e680ff);
        color: white;
      }

      .btn-copy-gen:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(212, 100, 255, 0.4);
      }

      @media (max-width: 768px) {
        .code-input-area {
          grid-template-columns: 1fr;
        }

        .generator-title {
          font-size: 2.5rem;
        }

        .btn-generate-large {
          padding: 20px 50px;
          font-size: 1.3rem;
        }
      }

      /* Editor View Styles */
      .editor-view-container {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #1a1a2e;
        z-index: 1001;
        display: flex;
        flex-direction: column;
        animation: slideInUp 0.3s ease-out;
      }

      @keyframes slideInUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .editor-view-header {
        background: rgba(20, 20, 35, 0.95);
        border-bottom: 2px solid rgba(100, 200, 255, 0.2);
        padding: 20px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }

      .editor-view-header h2 {
        background: linear-gradient(135deg, #64c8ff, #d464ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0;
      }

      .btn-close-editor {
        background: rgba(255, 100, 100, 0.2);
        border: 2px solid rgba(255, 100, 100, 0.5);
        color: #ff6b6b;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        font-size: 2rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-close-editor:hover {
        background: rgba(255, 100, 100, 0.3);
        transform: rotate(90deg);
      }

      .code-editor-display {
        flex: 1;
        background: rgba(10, 10, 20, 0.9);
        border: 1px solid rgba(100, 200, 255, 0.2);
        margin: 20px 30px;
        padding: 25px;
        overflow-y: auto;
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 14px;
        line-height: 1.8;
        color: #64c8ff;
        white-space: pre-wrap;
        word-wrap: break-word;
        border-radius: 8px;
        box-shadow: 0 0 30px rgba(100, 200, 255, 0.1);
      }

      .editor-view-buttons {
        display: flex;
        gap: 15px;
        padding: 20px 30px;
        background: rgba(20, 20, 35, 0.95);
        border-top: 2px solid rgba(100, 200, 255, 0.2);
      }

      .btn-copy-editor, .btn-download, .btn-new-gen {
        flex: 1;
        padding: 15px 25px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn-copy-editor {
        background: linear-gradient(135deg, #d464ff, #e680ff);
        color: white;
      }

      .btn-copy-editor:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(212, 100, 255, 0.4);
      }

      .btn-download {
        background: linear-gradient(135deg, #42b983, #52d9a1);
        color: white;
      }

      .btn-download:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(66, 185, 131, 0.4);
      }

      .btn-new-gen {
        background: linear-gradient(135deg, #64c8ff, #4db8ff);
        color: #0f0c29;
      }

      .btn-new-gen:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(100, 200, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <div class="logo-text">💻 Code Sync</div>
        <div class="connection-status">
          <div class="status-dot" id="statusDot"></div>
          <span id="connectionStatus">Connected</span>
        </div>
      </div>
      <div class="user-info">
        User: <span id="userEmail">Guest</span>
      </div>
      <div class="header-right">
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- PROJECT MODAL - REMOVED -->

    <!-- FULLSCREEN CODE GENERATOR -->
    <div id="codeGeneratorFullscreen" class="code-generator-fullscreen" style="display: none;">
      <div class="code-generator-content">
        <div class="code-generator-inner">
          <div class="code-generator-header">
            <h1>⚡ Code Generator</h1>
            <button class="btn-close-generator" onclick="document.getElementById('codeGeneratorFullscreen').style.display='none';">×</button>
          </div>

          <div class="code-input-area">
            <div class="code-input-section">
              <h3>What code do you need?</h3>
              <input 
                type="text" 
                id="codeTopicFullscreen" 
                placeholder="e.g., React counter, Python todo, Flask API, JavaScript form..."
                onkeypress="if(event.key==='Enter') generateCode();"
              />
              <button class="btn-gen-code" onclick="generateCode();">Generate Code</button>
            </div>

            <div class="code-input-section">
              <h3>Your Generated Code</h3>
              <div id="generatedCodeFullscreen" class="code-output-area">Enter a topic and click Generate...</div>
              <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-copy-gen" onclick="copyGeneratedCode();" style="flex: 1;">📋 Copy Code</button>
                <button class="btn-gen-code" onclick="loadCodeToEditor();" style="flex: 1; background: linear-gradient(135deg, #42b983, #52d9a1); color: white;">✓ Load to Editor</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- CODE EDITOR VIEW (AFTER LOADING CODE) -->
    <div id="editorView" class="editor-view-container" style="display: none;">
      <div class="editor-view-header">
        <h2>📝 Your Generated Code</h2>
        <button class="btn-close-editor" onclick="closeEditorView();">×</button>
      </div>
      <div id="codeEditorDisplay" class="code-editor-display"></div>
      <div class="editor-view-buttons">
        <button class="btn-copy-editor" onclick="copyEditorCode();">📋 Copy Code</button>
        <button class="btn-download" onclick="downloadCode();">⬇️ Download</button>
        <button class="btn-new-gen" onclick="backToGenerator();">⚡ Generate New</button>
      </div>
    </div>

    <!-- MAIN CENTERED GENERATOR BUTTON -->
    <div class="code-generator-main">
      <div class="generator-container">
        <div class="generator-icon">⚡</div>
        <h1 class="generator-title">Code Generator</h1>
        <p class="generator-subtitle">Generate professional code for any project<br>Python, JavaScript, React, Flask and more...</p>
        <button class="btn-generate-large" onclick="document.getElementById('codeGeneratorFullscreen').style.display='flex'; document.getElementById('codeTopicFullscreen').focus();">Start Generating Code</button>
      </div>
    </div>

    <script>
      // ===== CONFIGURATION & INITIALIZATION =====
      console.log('====== CODE SYNC EDITOR LOADED ======');
      
      // Display user info
      document.getElementById('userEmail').textContent = localStorage.getItem('userEmail') || 'Guest User';
      console.log('✓ User session loaded');
      
      // Ready notification
      setTimeout(() => {
        console.log('✓ Code generator fully initialized');
      }, 500);

      // CODE GENERATOR FUNCTIONS
      function openCodeGenerator() {
        document.getElementById('codeGeneratorModal').style.display = 'flex';
        document.getElementById('codeTopicInput').focus();
      }

      function closeCodeGenerator() {
        document.getElementById('codeGeneratorModal').style.display = 'none';
        document.getElementById('codeTopicInput').value = '';
        document.getElementById('generatedCodePreview').textContent = 'Enter a topic and click Generate...';
      }

      function generateCodeNow() {
        const topic = document.getElementById('codeTopicInput').value.trim();
        if (!topic) {
          alert('Please enter a code topic');
          return;
        }

        const code = getCodeTemplate(topic);
        document.getElementById('generatedCodePreview').textContent = code;
      }

      function getCodeTemplate(topic) {
        const lowerTopic = topic.toLowerCase().trim();
        let code = '';

        // ===== COMPREHENSIVE CODE TEMPLATE LIBRARY =====
        const templates = {
          // REACT / FRONTEND
          'react': { keywords: ['react', 'counter', 'component', 'hooks'], code: 'import React, { useState } from "react";\n\nexport default function App() {\n  const [count, setCount] = useState(0);\n  return (\n    <div style={{ padding: "20px", textAlign: "center" }}>\n      <h1>React Counter</h1>\n      <p style={{ fontSize: "48px" }}>{count}</p>\n      <button onClick={() => setCount(count + 1)}>+</button>\n      <button onClick={() => setCount(count - 1)}>-</button>\n      <button onClick={() => setCount(0)}>Reset</button>\n    </div>\n  );\n}\n' },
          
          // PYTHON / FLASK

          return;
        }
        navigator.clipboard.writeText(code).then(function() {
          alert('✓ Code copied to clipboard!');
        }).catch(function(err) {
          console.error('Failed to copy:', err);
          alert('Failed to copy code');
        });
      }

      // Simple Code Generator
      function generateCode() {
        try {
          const topic = document.getElementById('codeTopicFullscreen').value.trim();
          if (!topic) {
            alert('Please enter what code you need!');
            return;
          }

          console.log('Generating code for topic:', topic);
          const code = getCodeTemplate(topic);
          console.log('Generated code length:', code.length);
          document.getElementById('generatedCodeFullscreen').textContent = code;
          console.log('✓ Code generated successfully');
        } catch (error) {
          console.error('Error in generateCode:', error);
          alert('Error generating code: ' + error.message);
        }
      }

      // Make code generator functions global
      window.generateCode = generateCode;
      window.getCodeTemplate = getCodeTemplate;
      window.copyGeneratedCode = copyGeneratedCode;
      window.loadCodeToEditor = loadCodeToEditor;
      window.closeEditorView = closeEditorView;
      window.copyEditorCode = copyEditorCode;
      window.downloadCode = downloadCode;
      window.backToGenerator = backToGenerator;

      // Logout function
      function logout() {
        localStorage.removeItem('userRole');
        localStorage.removeItem('userEmail');
        localStorage.removeItem('adminId');
        localStorage.removeItem('timestamp');
        window.location.href = '/';
      }

      // Expose logout to global scope for onclick handlers
      window.logout = logout;

      // ===== CODE EDITOR VIEW FUNCTIONS =====

      function loadCodeToEditor() {
        const code = document.getElementById('generatedCodeFullscreen').textContent;
        if (code.indexOf('Enter a topic') !== -1) {
          alert('Please generate code first!');
          return;
        }
        
        // Display the editor view with the generated code
        document.getElementById('codeGeneratorFullscreen').style.display = 'none';
        document.getElementById('editorView').style.display = 'flex';
        document.getElementById('codeEditorDisplay').textContent = code;
        
        // Show success message
        alert('✓ Code loaded to editor!');
      }

      function closeEditorView() {
        document.getElementById('editorView').style.display = 'none';
        document.getElementById('codeGeneratorFullscreen').style.display = 'flex';
      }

      function copyEditorCode() {
        const code = document.getElementById('codeEditorDisplay').textContent;
        navigator.clipboard.writeText(code).then(() => {
          alert('✓ Code copied to clipboard!');
        });
      }

      function downloadCode() {
        const code = document.getElementById('codeEditorDisplay').textContent;
        const element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(code));
        
        // Detect language from code
        let filename = 'generated_code';
        if (code.includes('import React') || code.includes('export default')) {
          filename = 'App.jsx';
        } else if (code.includes('from fastapi import FastAPI')) {
          filename = 'main.py';
        } else if (code.includes('package main') && code.includes('gin.Default')) {
          filename = 'main.go';
        } else if (code.includes('use std::io;')) {
          filename = 'main.rs';
        } else if (code.includes('Microsoft.AspNetCore.Builder')) {
          filename = 'Program.cs';
        } else if (code.includes('apiVersion: apps/v1')) {
          filename = 'k8s.yaml';
        } else if (code.includes('FROM node:20-alpine')) {
          filename = 'Dockerfile';
        } else if (code.includes('from flask') || code.includes('def ')) {
          filename = 'app.py';
        } else if (code.includes('const express')) {
          filename = 'server.js';
        } else if (code.includes('class ') && code.includes('public ')) {
          filename = 'App.java';
        } else if (code.includes('console.log') || code.includes('const ')) {
          filename = 'script.js';
        }
        
        element.setAttribute('download', filename);
        element.style.display = 'none';
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
        alert(`✓ Code downloaded as ${filename}`);
      }

      function backToGenerator() {
        document.getElementById('editorView').style.display = 'none';
        document.getElementById('codeGeneratorFullscreen').style.display = 'flex';
        document.getElementById('codeTopicFullscreen').value = '';
        document.getElementById('generatedCodeFullscreen').textContent = 'Enter a topic and click Generate...';
        document.getElementById('codeTopicFullscreen').focus();
      }

      // Expose all editor view functions globally
      window.loadCodeToEditor = loadCodeToEditor;
      window.closeEditorView = closeEditorView;
      window.copyEditorCode = copyEditorCode;
      window.downloadCode = downloadCode;
      window.backToGenerator = backToGenerator;
      window.copyGeneratedCode = copyGeneratedCode;

      // Update connection status
      function updateConnectionStatus(status) {
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('connectionStatus');
        
        if (status === 'connected') {
          statusDot.classList.remove('disconnected');
          statusText.textContent = 'Connected';
        } else {
          statusDot.classList.add('disconnected');
          statusText.textContent = 'Disconnected';
        }
      }

      // Monitor connection
      window.addEventListener('focus', () => {
        updateConnectionStatus('connected');
      });

      window.addEventListener('blur', () => {
        updateConnectionStatus('disconnected');
      });

      // WebSocket Connection for Real-time Collaboration
      let WEBSOCKET_URL = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.hostname}:8089`;
      let ws = null;
      let isConnected = false;

      async function resolveWebSocketUrl() {
        try {
          const response = await fetch('/health');
          if (!response.ok) return;
          const health = await response.json();
          if (health && health.websocket_port) {
            const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            WEBSOCKET_URL = `${protocol}://${window.location.hostname}:${health.websocket_port}`;
          }
        } catch (error) {
          console.warn('Using default WebSocket URL:', WEBSOCKET_URL, error);
        }
      }

      function initializeWebSocket() {
        console.log('🔗 Initializing WebSocket connection to:', WEBSOCKET_URL);
        
        try {
          ws = new WebSocket(WEBSOCKET_URL);

          ws.onopen = () => {
            isConnected = true;
            console.log('✓ WebSocket connected');
            updateConnectionStatus('connected');
          };

          ws.onmessage = (event) => {
            try {
              const data = JSON.parse(event.data);
              console.log('📨 Message received:', data.type);

              if (data.type === 'connection') {
                console.log('✓ Server connected:', data.message);
              } else if (data.type === 'full-document') {
                console.log('📄 Received full document from server');
                // Optionally load initial document
              } else if (data.type === 'patch') {
                console.log('📝 Received patch from server');
                // Handle real-time patches from other users
              }
            } catch (error) {
              console.error('Failed to parse message:', error);
            }
          };

          ws.onclose = () => {
            isConnected = false;
            console.log('❌ WebSocket disconnected');
            updateConnectionStatus('disconnected');
            // Attempt reconnection after 3 seconds
            setTimeout(initializeWebSocket, 3000);
          };

          ws.onerror = (error) => {
            console.error('⚠️ WebSocket error:', error);
            updateConnectionStatus('error');
          };
        } catch (error) {
          console.error('Failed to initialize WebSocket:', error);
        }
      }

      async function bootCollaboration() {
        console.log('🚀 Resolving collaboration config...');
        await resolveWebSocketUrl();
        initializeWebSocket();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bootCollaboration);
      } else {
        bootCollaboration();
      }
    </script>
  </body>
</html>
